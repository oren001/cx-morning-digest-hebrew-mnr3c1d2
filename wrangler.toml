```toml
name = "morning-digest"
main = "index.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["0 6 * * *"]

[[kv_namespaces]]
binding = "ARTICLES_KV"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
ENVIRONMENT = "production"

[env.development]
name = "morning-digest-dev"

[[env.development.kv_namespaces]]
binding = "ARTICLES_KV"
id = "YOUR_DEV_KV_NAMESPACE_ID"

[env.development.vars]
ENVIRONMENT = "development"

[build]
command = ""

[site]
bucket = ""
```